stage: "stage1"
model: "copernicus_fm"
subset_min_valid_ratio: 0.2
subset_max_nan_ratio: 0.05
copernicus_fm:
  repo_subdir: "Copernicus-FM"
  variant: "vit_base_varlang_e100"
  checkpoint_path: null   # set absolute path to override auto-discovery
  strict_load: false
  freeze_backbone: true

decoder:
  type: "upconv"          # "upconv" | "trans_hybrid"
  trans_dim: 384
  trans_heads: 8
  trans_layers: 4
  trans_ffn_ratio: 4
  trans_use_2d_sincos_pos: true

io:
  input_channels: [4, 5]          # VV, VH
  target_channels: [0, 1, 2, 3]   # B4, B3, B2, B8

masking:
  cloud_threshold: 30.0
  loss_valid_only: true
  metrics_valid_only: true

spectral:
  # S1 convention used in Copernicus-Bench configs
  wave_list: [50000000.0, 50000000.0]
  bandwidth: [1000000000.0, 1000000000.0]

train:
  subset:
    mode: "index_top_n"
    n_patches: 1024
    seed: 0

runtime:
  epochs: 12
  batch_size: 8
  num_workers: 0
  lr: 0.0003
  weight_decay: 0.0001
  seed: 0

loss:
  lambda_ssim: 0.2
  lambda_edge: 0.1

eval:
  min_valid_pixel_ratio_for_metrics: 0.01
  save_val_png_each_epoch: true
