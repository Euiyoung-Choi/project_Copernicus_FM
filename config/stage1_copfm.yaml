stage: "stage1"
model: "copernicus_fm"
subset_min_valid_ratio: 0.0
subset_max_nan_ratio: 1.0
copernicus_fm:
  repo_subdir: "Copernicus-FM"
  variant: "vit_base_varlang_e100"
  checkpoint_path: null   # set absolute path to override auto-discovery
  strict_load: false
  freeze_backbone: true

io:
  input_channels: [4, 5]          # VV, VH
  target_channels: [0, 1, 2, 3]   # B4, B3, B2, B8

masking:
  cloud_threshold: 30.0
  loss_valid_only: true
  metrics_valid_only: true

spectral:
  wave_list: [5600.0, 5600.0]   # placeholder metadata for SAR VV/VH
  bandwidth: [10.0, 10.0]

train:
  subset:
    mode: "index_top_n"
    n_patches: 64
    seed: 0

runtime:
  epochs: 2
  batch_size: 4
  num_workers: 0
  lr: 0.001
  seed: 0

eval:
  min_valid_pixel_ratio_for_metrics: 0.01
