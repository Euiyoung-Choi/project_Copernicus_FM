stage: "stage1"
model: "gan_pix2pix"
subset_min_valid_ratio: 0.0
subset_max_nan_ratio: 1.0

io:
  # Input: S1 only
  input_channels: [4, 5]          # VV, VH (0-based indices)
  # Target: S2 RGB+NIR
  target_channels: [0, 1, 2, 3]   # B4, B3, B2, B8 (0-based indices)

masking:
  cloud_threshold: 30.0
  loss_valid_only: true
  metrics_valid_only: true

train:
  subset:
    mode: "index_top_n"
    n_patches: 64
    seed: 0

runtime:
  epochs: 2
  batch_size: 4
  num_workers: 0
  lr: 0.0002
  lambda_l1: 100.0
  seed: 0

eval:
  min_valid_pixel_ratio_for_metrics: 0.01
